[pytest]
testpaths =
    tests
markers =
    fsps: integration tests requiring python-fsps, sedpy, and configured SPS_HOME grids
    cigale: optional tests requiring pcigale and its database
    cigale_fsps: experimental tests requiring pcigale, python-fsps, and configured SPS_HOME
    sbi: optional tests requiring torch and nflows
    jaxcigale: optional tests requiring jax/jaxlib and, for DSPS checks, dsps
